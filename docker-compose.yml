services:
  html-share:
    build: .
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: file:/app/data/app.db
      APP_SECRET: ${APP_SECRET}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
